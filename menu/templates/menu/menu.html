<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
</head>
<body>
    <ol>
    {% for item in items %}
        <li><a href = {% url 'food' item.id %}>{{item.food}}</a> {{item.price}}</li>
    {% empty %}
        <p>No food available</p>
    {% endfor %}
    </ol>
</body>
</html>
